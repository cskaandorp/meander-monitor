name: Deploy meander-monitor

# Standalone copy of the fleet pipeline (fwddeployer's deploy-app.yml), with
# meander-monitor's values inlined. This repo lives outside the FwdFaster org
# and fwddeployer is private, so the shared `uses:` recipe can't be called from
# here — the pipeline is vendored instead.
#
# NOTE: this is a fork, not a caller. Fixes made to fwddeployer's deploy-app.yml
# and shipped by moving its `v1` tag do NOT reach this file. If the fleet recipe
# changes in a way that matters, port it here by hand.
#
# Validates migrations on a throwaway Postgres, then (only on push to main)
# deploys over SSH — build, back up, migrate, restart.

on:
  push:
    branches:
      - main
  pull_request:

# Never let two deploys of this app race. Ref-scoped so PRs don't block each
# other or main; cancel stale PR checks, but never cancel a running main deploy
# mid-migration.
concurrency:
  group: deploy-meander-monitor-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  migrations-check:
    runs-on: ubuntu-latest
    services:
      db:
        # pgvector/pgvector:pg15 — a superset of plain pg15, matching prod's
        # major. We don't use pgvector itself.
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      PGHOST: localhost
      PGPORT: "5432"
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: postgres
    steps:
      - uses: actions/checkout@v4
      - name: Install psql client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: Bootstrap the Supabase-provided environment
        run: psql -v ON_ERROR_STOP=1 -f supabase/ci-bootstrap.sql
      - name: Replay all migrations from zero
        run: bash supabase/migrate.sh
      - name: Assert every migration is recorded in the ledger
        run: |
          files=$(ls supabase/migrations/*.sql | wc -l | tr -d ' ')
          rows=$(psql -tAc "select count(*) from supabase_migrations.schema_migrations" | tr -d ' ')
          echo "migration files: $files   ledger rows: $rows"
          test "$files" = "$rows"

  deploy:
    needs: migrations-check
    # Only deploy on a real push to main — not on pull_request validation runs.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH (hop through Rodney)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.RODNEY_HOST }}
          port: 22
          username: ${{ secrets.RODNEY_USER }}
          key: ${{ secrets.RODNEY_SSH_KEY }}
          script: |
            ssh -o StrictHostKeyChecking=no ${{ secrets.PATRICK_USER }}@${{ secrets.PATRICK_HOST }} << 'DEPLOY'
            set -e
            cd /var/www/meander-monitor
            git checkout -- .
            git pull origin main

            # 1) Build first — fails before touching the DB.
            rm -rf .next
            npm ci
            npm run build
            test -f .next/standalone/server.js || { echo "❌ Build failed: server.js missing"; exit 1; }
            mkdir -p .next/standalone/public
            cp -r public/* .next/standalone/public/ 2>/dev/null || true
            mkdir -p .next/standalone/.next/static
            cp -r .next/static/* .next/standalone/.next/static/

            # 1b) Guard the static assets. `output: standalone` ships NO static
            #     assets of its own — they're copied in above. If anything the
            #     document references is absent, the app still boots but the
            #     browser fails to load JS chunks (ChunkLoadError → "Application
            #     error"), which looks like a crash and isn't.
            #
            #     Two distinct failures, two checks. A file-count comparison
            #     catches NEITHER: on 2026-07-17 it printed "✓ 44/44" and shipped
            #     a site whose landing page referenced a chunk missing from both
            #     trees — the copy was perfect, the BUILD was incomplete.

            # (i) copy fidelity — same files, not merely the same number of them
            diff <(cd .next/static && find . -type f | sort) \
                 <(cd .next/standalone/.next/static && find . -type f | sort) \
              || { echo "❌ Static copy incomplete — aborting before restart"; exit 1; }

            # (ii) build integrity — boot the new build on a scratch port and ask
            #      it what the landing page references, then check every one of
            #      those files exists. Reading the build manifests instead is not
            #      enough: Turbopack doesn't write app-build-manifest.json, so the
            #      manifests name ~9 assets where the rendered page names ~16.
            #      Only the server knows the real answer, so we ask the server.
            set -a; [ -f .env.local ] && . ./.env.local; set +a
            PORT=3099 HOSTNAME=127.0.0.1 node .next/standalone/server.js > /tmp/mm-smoke.log 2>&1 &
            SMOKE_PID=$!
            for i in $(seq 1 30); do
              curl -sf -o /dev/null http://127.0.0.1:3099/ 2>/dev/null && break
              sleep 0.5
            done
            SMOKE_CODE=$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:3099/ || echo 000)
            curl -s http://127.0.0.1:3099/ | grep -oE '/_next/static/[^"]+\.(js|css)' | sort -u > /tmp/mm-refs.txt || true
            kill $SMOKE_PID 2>/dev/null || true
            wait $SMOKE_PID 2>/dev/null || true

            [ "$SMOKE_CODE" = "200" ] || {
              echo "❌ New build does not serve / (HTTP $SMOKE_CODE) — aborting before restart";
              tail -20 /tmp/mm-smoke.log; exit 1; }

            REF_COUNT=$(wc -l < /tmp/mm-refs.txt)
            [ "$REF_COUNT" -gt 0 ] || { echo "❌ Rendered page referenced no static assets — aborting"; exit 1; }

            MISSING=0
            while read -r ref; do
              f=".next/standalone/.next/${ref#/_next/}"
              [ -f "$f" ] || { echo "   MISSING $ref"; MISSING=$((MISSING+1)); }
            done < /tmp/mm-refs.txt
            [ "$MISSING" -eq 0 ] || {
              echo "❌ Build referenced $MISSING of $REF_COUNT assets it never emitted — would ship a ChunkLoadError; aborting before restart";
              exit 1; }
            echo "✓ build serves 200 and all $REF_COUNT referenced assets exist"

            # 2) DB connection — the app's Postgres container. Password from the
            #    container's own env (no host .env read). Needs the deploy user in
            #    the docker group (CI is non-interactive, so no sudo for docker).
            #
            #    ⚠️  EVERY `docker exec -i` below MUST have its stdin redirected.
            #    This whole script arrives on the remote shell as a heredoc — the
            #    script IS stdin. `-i` attaches stdin to the container, so any such
            #    command swallows the REST OF THIS SCRIPT as input, the shell hits
            #    EOF, and the job exits 0 having silently skipped everything after.
            #    That is not hypothetical: on 2026-07-17 it ate the backup, the
            #    migrations and the restart, reported green, and left a stale
            #    process serving a rebuilt .next (ChunkLoadError) against a
            #    database with no schema.
            PGPW="$(docker exec mm-supabase-db printenv POSTGRES_PASSWORD < /dev/null)"
            DB_EXEC="docker exec -i -e PGPASSWORD=$PGPW mm-supabase-db"

            # 3) Pre-migration backup — abort before migrate if it fails. Keep 10.
            #    NOTE: this dumps Postgres only. Storage FILES (the `web` bucket)
            #    are not covered — back up the storage volume separately.
            mkdir -p /home/casper/meander-monitor-db-backups
            BACKUP="/home/casper/meander-monitor-db-backups/pre-migrate-$(date -u +%Y%m%dT%H%M%SZ).sql"
            echo "→ backing up DB to $BACKUP.gz"
            $DB_EXEC pg_dump -U postgres -d postgres --no-owner < /dev/null > "$BACKUP" \
              || { echo "❌ Pre-migration backup failed — aborting deploy"; rm -f "$BACKUP"; exit 1; }
            gzip -f "$BACKUP"
            # Prune to the newest 10. `|| true` because `set -e` is on and this is
            # housekeeping — a pruning hiccup must never abort a deploy.
            ls -1t /home/casper/meander-monitor-db-backups/pre-migrate-*.sql.gz 2>/dev/null \
              | tail -n +11 | xargs -r rm -f || true

            # 4) Apply pending migrations, gated — abort before restart on failure.
            #    `< /dev/null` is load-bearing: migrate.sh's own `docker exec -i`
            #    calls would otherwise inherit this script as their stdin and eat
            #    it. Its internal per-command redirects (`< "$f"`, pipes) are
            #    unaffected — they set their own stdin.
            PSQL="$DB_EXEC psql -U postgres -d postgres" ./supabase/migrate.sh < /dev/null \
              || { echo "❌ Migration failed — aborting deploy (restore from $BACKUP.gz)"; exit 1; }

            # 4b) Reload PostgREST's schema cache so newly-added tables/relationships
            #     are visible via the REST API without waiting for a container restart.
            $DB_EXEC psql -U postgres -d postgres -c "notify pgrst, 'reload schema';" < /dev/null || true

            # 5) Restart onto the new code + schema, then verify it actually booted.
            sudo systemctl restart meander-monitor
            sleep 2
            if systemctl is-active --quiet meander-monitor; then
              echo "✅ meander-monitor is running"
            else
              echo "❌ meander-monitor failed to start"
              journalctl -u meander-monitor -n 40 --no-pager || true
              exit 1
            fi
            DEPLOY
